version: 2.1

jobs:
  build:
    docker:
      - image: node:18
    working_directory: ~/wallet-api
    steps:
      - checkout
      - run:
          name: 'Installing YARN packages'
          command: yarn install
      - run:
          name: 'Run YARN build'
          command: yarn build
  test:
    docker:
      - image: node:18
    working_directory: ~/wallet-api
    steps:
      - checkout
      - run:
          name: 'Installing YARN packages'
          command: yarn install
      - run:
          name: 'Run YARN tests'
          command: yarn test

workflows:
  version: 2
  build_test:
    jobs:
      - build
      - test:
          requires:
            - build
