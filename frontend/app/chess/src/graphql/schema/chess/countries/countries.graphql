type Country {
  countryCode: String
  count: Int
}

type CountryStat {
  average: Float
  max: Float
}

type CountryStats {
  rapid: CountryStat
  blitz: CountryStat
  bullet: CountryStat
}

type TitledCountry {
  stats: CountryStats
  total: Int
  titles: [TitleTotal]
  players: [Player]
}

type TitleTotal {
  title: String
  total: Int
}
