openapi: 3.0.0
paths:
  /v1/countries:
    get:
      operationId: CountriesController_getCountries
      parameters:
        - name: timezone
          required: false
          in: query
          description: Timezone
          schema:
            type: string
        - name: language
          required: false
          in: query
          description: Language
          schema:
            type: string
        - name: currency
          required: false
          in: query
          description: Currency
          schema:
            type: string
        - name: subregion
          required: false
          in: query
          description: Subregion
          schema:
            type: string
        - name: region
          required: false
          in: query
          description: Region
          schema:
            enum:
              - AFRICA
              - AMERICAS
              - ANTARCTIC
              - ASIA
              - EUROPE
              - OCEANIA
            type: string
        - name: unMember
          required: false
          in: query
          description: United Nation Member
          schema:
            type: boolean
        - name: capital
          required: false
          in: query
          description: Capital
          schema:
            type: string
        - name: name
          required: false
          in: query
          description: Name
          schema:
            type: string
      responses:
        "200":
          description: List of Countries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountriesResponseDto"
      tags: &a1
        - countries
  /v1/countries/{code}:
    get:
      operationId: CountriesController_getCountry
      parameters:
        - name: code
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Get Country by Code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryDto"
      tags: *a1
  /v1/countries/currencies:
    get:
      operationId: CountriesController_getCurrencies
      parameters: []
      responses:
        "200":
          description: List of Currencies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrenciesResponseDto"
      tags: *a1
  /v1/currencies:
    get:
      operationId: CurrenciesController_getCurrencies
      parameters: []
      responses:
        "200":
          description: List of Currencies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrenciesResponseDto"
      tags:
        - currencies
  /v1/languages:
    get:
      operationId: LanguagesController_getLanguages
      parameters: []
      responses:
        "200":
          description: List of Languages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LanguagesResponseDto"
      tags:
        - languages
  /v1/organizations:
    get:
      operationId: OrganizationsController_getOrganizations
      parameters: []
      responses:
        "200":
          description: List of Organizations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationsResponseDto"
      tags: &a2
        - organizations
  /v1/organizations/{code}:
    get:
      operationId: OrganizationsController_getOrganization
      parameters:
        - name: code
          required: true
          in: path
          description: Organization Code
          schema:
            type: string
      responses:
        "200":
          description: Get Organization by Code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationDto"
      tags: *a2
  /v1/vietnam/ethnic-groups:
    get:
      operationId: VietnamController_getEthnicGroups
      parameters: []
      responses:
        "200":
          description: List of Ethnic Groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EthnicGroupsResponseDto"
      tags: &a3
        - vietnam
  /v1/vietnam/license-plates:
    get:
      operationId: VietnamController_getLicensePlates
      parameters: []
      responses:
        "200":
          description: List of License Plates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicensePlatesResponseDto"
      tags: *a3
  /v1/vietnam/license-plates/{code}:
    get:
      operationId: VietnamController_getLicensePlate
      parameters:
        - name: code
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Get License Plate by Code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicensePlateDto"
      tags: *a3
  /v1/github/languages:
    get:
      operationId: GitHubController_getLanguages
      parameters: []
      responses:
        "200":
          description: List of Languages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GitHubLanguagesResponseDto"
      tags:
        - github
  /v1/health:
    get:
      operationId: HealthController_getHealth
      parameters: []
      responses:
        "200":
          description: State of the Server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponseDto"
      tags:
        - health
  /v1/news/google:
    get:
      operationId: NewsController_getGoogle
      parameters: []
      responses:
        "200":
          description: List of Google Trends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleResponseDto"
      tags: &a4
        - news
  /v1/news/sources:
    get:
      operationId: NewsController_getSources
      parameters: []
      responses:
        "200":
          description: List of News Sources
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsSourcesDto"
      tags: *a4
  /v1/status/{service}:
    get:
      operationId: StatusController_getSources
      parameters:
        - name: service
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Service Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusDto"
      tags:
        - status
info:
  title: hieudoanm
  description: Hieu Doan
  version: "1.0"
  contact: {}
tags: []
servers: []
components:
  schemas:
    CountryDto:
      type: object
      properties: {}
    CountriesResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        regions:
          default: []
          type: array
          items:
            type: string
        subregions:
          default: []
          type: array
          items:
            type: string
        countries:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/CountryDto"
      required:
        - total
        - regions
        - subregions
        - countries
    CurrencyDto:
      type: object
      properties:
        code:
          type: string
          default: ""
        name:
          type: string
          default: ""
        symbol:
          type: string
          default: ""
      required:
        - code
        - name
        - symbol
    CurrenciesResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        currencies:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/CurrencyDto"
      required:
        - total
        - currencies
    LanguageDto:
      type: object
      properties: {}
    LanguagesResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        languages:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/LanguageDto"
      required:
        - total
        - languages
    OrganizationDto:
      type: object
      properties: {}
    OrganizationsResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        organizations:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/OrganizationDto"
      required:
        - total
        - organizations
    EthnicGroupDto:
      type: object
      properties: {}
    EthnicGroupsResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        ethnicGroups:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/EthnicGroupDto"
      required:
        - total
        - ethnicGroups
    LicensePlateDto:
      type: object
      properties: {}
    LicensePlatesResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        licensePlates:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/LicensePlateDto"
      required:
        - total
        - licensePlates
    ProgrammingLanguageDto:
      type: object
      properties: {}
    GitHubLanguagesResponseDto:
      type: object
      properties:
        total:
          type: number
        languages:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/ProgrammingLanguageDto"
      required:
        - total
        - languages
    HealthResponseDto:
      type: object
      properties:
        status:
          type: string
          default: ""
      required:
        - status
    GoogleCountryDto:
      type: object
      properties:
        country:
          type: string
          default: 0
        queries:
          default: []
          type: array
          items:
            type: string
      required:
        - country
        - queries
    GoogleResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        countries:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/GoogleCountryDto"
      required:
        - total
        - countries
    NewsSourceDto:
      type: object
      properties:
        id:
          type: string
          default: ""
        name:
          type: string
          default: ""
        description:
          type: string
          default: ""
        url:
          type: string
          default: ""
        category:
          type: string
          default: ""
        language:
          type: string
          default: ""
        country:
          type: string
          default: ""
      required:
        - id
        - name
        - description
        - url
        - category
        - language
        - country
    NewsSourcesDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        sources:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/NewsSourceDto"
      required:
        - total
        - sources
    StatusDto:
      type: object
      properties:
        error:
          type: boolean
      required:
        - error
