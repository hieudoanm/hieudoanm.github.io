openapi: 3.0.0
paths:
  /v1/countries:
    get:
      operationId: CountriesController_getCountries
      parameters:
        - name: timezone
          required: false
          in: query
          description: Timezone
          schema:
            type: string
        - name: language
          required: false
          in: query
          description: Language
          schema:
            type: string
        - name: currency
          required: false
          in: query
          description: Currency
          schema:
            type: string
        - name: subregion
          required: false
          in: query
          description: Subregion
          schema:
            type: string
        - name: region
          required: false
          in: query
          description: Region
          schema:
            enum:
              - AFRICA
              - AMERICAS
              - ANTARCTIC
              - ASIA
              - EUROPE
              - OCEANIA
            type: string
        - name: unMember
          required: false
          in: query
          description: United Nation Member
          schema:
            type: boolean
        - name: capital
          required: false
          in: query
          description: Capital
          schema:
            type: string
        - name: name
          required: false
          in: query
          description: Name
          schema:
            type: string
      responses:
        "200":
          description: List of Countries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountriesResponseDto"
      tags: &a1
        - countries
  /v1/countries/{code}:
    get:
      operationId: CountriesController_getCountry
      parameters:
        - name: code
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Get Country by Code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryDto"
      tags: *a1
  /v1/organizations:
    get:
      operationId: OrganizationsController_getOrganizations
      parameters: []
      responses:
        "200":
          description: List of Organizations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationsResponseDto"
      tags: &a2
        - organizations
  /v1/organizations/{code}:
    get:
      operationId: OrganizationsController_getOrganization
      parameters:
        - name: code
          required: true
          in: path
          description: Organization Code
          schema:
            type: string
      responses:
        "200":
          description: Get Organization by Code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationDto"
      tags: *a2
  /v1/vietnam/ethnic-groups:
    get:
      operationId: VietnamController_getEthnicGroups
      parameters: []
      responses:
        "200":
          description: List of Ethnic Groups
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EthnicGroupsResponseDto"
      tags: &a3
        - vietnam
  /v1/vietnam/license-plates:
    get:
      operationId: VietnamController_getLicensePlates
      parameters: []
      responses:
        "200":
          description: List of License Plates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicensePlatesResponseDto"
      tags: *a3
  /v1/vietnam/license-plates/{code}:
    get:
      operationId: VietnamController_getLicensePlate
      parameters:
        - name: code
          required: true
          in: path
          schema:
            type: string
      responses:
        "200":
          description: Get License Plate by Code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LicensePlateDto"
      tags: *a3
  /v1/health:
    get:
      operationId: HealthController_getHealth
      parameters: []
      responses:
        "200":
          description: State of the Server
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponseDto"
      tags:
        - health
info:
  title: hieudoanm
  description: Hieu Doan
  version: "1.0"
  contact: {}
tags: []
servers: []
components:
  schemas:
    CountryDto:
      type: object
      properties: {}
    CountriesResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        regions:
          default: []
          type: array
          items:
            type: string
        subregions:
          default: []
          type: array
          items:
            type: string
        countries:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/CountryDto"
      required:
        - total
        - regions
        - subregions
        - countries
    OrganizationDto:
      type: object
      properties: {}
    OrganizationsResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        organizations:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/OrganizationDto"
      required:
        - total
        - organizations
    EthnicGroupDto:
      type: object
      properties: {}
    EthnicGroupsResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        ethnicGroups:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/EthnicGroupDto"
      required:
        - total
        - ethnicGroups
    LicensePlateDto:
      type: object
      properties: {}
    LicensePlatesResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        licensePlates:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/LicensePlateDto"
      required:
        - total
        - licensePlates
    HealthResponseDto:
      type: object
      properties:
        status:
          type: string
          default: ""
      required:
        - status
