name: CI - Deploy

on:
  push:
    branches:
      - master

jobs:
  github-actions:
    strategy:
      matrix:
        os:
          - name: Ubuntu
            version: ubuntu-latest
        node:
          - name: Node.js 18
            version: 18.x
        project:
          - name: Gatsby
            working-directory: ./web/gatsby
    name: ${{ matrix.node.name }} - ${{ matrix.os.name }} - ${{ matrix.project.name }}
    runs-on: ${{ matrix.os.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node.version }}
      - name: Install Dependencies
        run: yarn install --network-timeout 86400000
        working-directory: ${{ matrix.project.working-directory }}
      - name: Build GitHub Pages
        run: yarn build
        working-directory: ${{ matrix.project.working-directory }}
      - name: Unit Tests
        run: yarn test
        working-directory: ${{ matrix.project.working-directory }}
      - name: Deploy GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4.4.1
        with:
          token: ${{ secrets.GH_PAGES }}
          branch: gh-pages
          folder: web/gatsby/public
          clean: true
