name: CI - Browser Extensions

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'hotfix/**'
      - 'feature/**'
      - 'renovate/**'
      - 'dependabot/**'
    paths:
      - 'packages/extensions/browser/**'
      - '.github/workflows/ci-brower-extensions.yaml'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dir: block/ads
            name: '@block/ads'
          - dir: block/sites
            name: '@block/sites'
          - dir: chess/focus
            name: '@chess/focus'
          - dir: claude/limit
            name: '@claude/limit'
          - dir: github/open-link
            name: '@github/open-link'
          - dir: instagram/download
            name: '@instagram/download'
          - dir: shopify/detect
            name: '@shopify/detect'
          - dir: tab/new
            name: '@tab/new'
          - dir: tab/snapshot
            name: '@tab/snapshot'
          - dir: youtube/transcript
            name: '@youtube/transcript'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: '11.5.2'
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '26.3.0'
          cache: 'pnpm'
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1.7.3
      - name: Install Dependencies
        run: pnpm install
      - name: Build
        run: pnpm run build --filter=${{ matrix.name }}
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.dir }}
          path: packages/extensions/browser/${{ matrix.dir }}/download/

  publish:
    name: Publish to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect Release Artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
      - name: Publish Release
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --title "Browser Extensions (latest)" \
            --notes "Auto-built browser extensions from commit ${{ github.sha }}" \
            release/*
        env:
          GH_TOKEN: ${{ github.token }}
