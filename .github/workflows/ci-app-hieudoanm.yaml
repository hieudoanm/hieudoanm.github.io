name: CI - App - Hieu Doan

concurrency:
  group: ci-app-hieudoanm-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'hotfix/**'
      - 'feature/**'
      - 'renovate/**'
      - 'dependabot/**'
    paths:
      - 'packages/app/hieudoanm/**'
      - '.github/workflows/ci-app-hieudoanm.yaml'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: '11.11.0'
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '26.4.0'
          cache: 'pnpm'
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          install-chromedriver: true
      - name: Install Dependencies
        run: pnpm install
      - name: Lint
        run: pnpm run lint --filter=@hieudoanm.github.io/app
      - name: Build Workspace Dependencies
        run: pnpm run build --filter=@api/ts --filter=@chess/ts --filter=@lodash/ts --filter=@lodashx/ts --filter=@frontend/native --filter=@frontend/react
      - name: Build
        run: pnpm run build --filter=@hieudoanm.github.io/app
      - name: Test
        run: pnpm run test --filter=@hieudoanm.github.io/app || echo 'No tests configured'

  desktop:
    name: Desktop (${{ matrix.os }})
    needs: [build]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: '11.11.0'
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '26.4.0'
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install
      - name: Install System Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Build Workspace Dependencies
        run: pnpm run build --filter=@api/ts --filter=@chess/ts --filter=@lodash/ts --filter=@lodashx/ts --filter=@frontend/native --filter=@frontend/react
      - name: Build Frontend
        working-directory: packages/app/hieudoanm
        run: EXPORT=true pnpm run build
      - name: Build Tauri Desktop
        working-directory: packages/app/hieudoanm
        run: pnpm exec tauri build --ci --config '{"build":{"beforeBuildCommand":""}}'
      - name: Sanitize artifact name
        shell: bash
        run: echo "app_safe=web" >> "$GITHUB_ENV"
      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hieudoanm_desktop_${{ matrix.os }}
          path: packages/app/hieudoanm/src-tauri/target/release/bundle/

  publish:
    name: Publish to GitHub Release
    needs: [desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect Release Artifacts
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            find "$dir" -type f \( \
              -name "*.AppImage" -o \
              -name "*.deb" -o \
              -name "*.dmg" -o \
              -name "*.app" -o \
              -name "*.msi" -o \
              -name "*.tar.xz" \
            \) ! -name "*control.tar.gz" ! -name "*data.tar.gz" -print0 | while IFS= read -r -d '' file; do
              cp "$file" "release/"
            done
          done
      - name: Publish Release
        run: |
          gh release delete app-hieudoanm-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create app-hieudoanm-latest \
            --title "App - Hieu Doan (latest)" \
            --notes "Auto-built apps from commit ${{ github.sha }}" \
            $(find release -type f | sort)
        env:
          GH_TOKEN: ${{ github.token }}
