name: CI

on:
  push:
    branches:
      - master
      - develop
      - hotfix/**
      - feature/**
      - renovate/**
    paths:
      - .github/workflows/ci.yaml
      - web/**

jobs:
  github-actions:
    strategy:
      matrix:
        os:
          - name: Ubuntu
            version: ubuntu-latest
        node:
          - name: Node.js 18
            version: 18.x
        project:
          - name: Gatsby
            working-directory: ./web/gatsby
          - name: Svelte
            working-directory: ./web/svelte
    name: ${{ matrix.node.name }} - ${{ matrix.os.name }} - ${{ matrix.project.name }}
    runs-on: ${{ matrix.os.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node.version }}
      - name: Install Dependencies
        run: yarn install --network-timeout 86400000
        working-directory: ${{ matrix.project.working-directory }}
      - name: Build Production
        run: yarn build
        working-directory: ${{ matrix.project.working-directory }}
      # - name: Unit Test
      #   run: yarn test
      #   working-directory: ${{ matrix.project.working-directory }}
