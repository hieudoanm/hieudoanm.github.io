name: CI - CLI

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'hotfix/**'
      - 'feature/**'
      - 'renovate/**'
      - 'dependabot/**'
    paths:
      - 'packages/cli/hieudoanm/clap.rs/**'
      - 'packages/cli/hieudoanm/cobra.go/**'
      - 'packages/cli/hieudoanm/swift/**'
      - '.github/workflows/ci-cli.yaml'

permissions:
  contents: write

jobs:
  rust:
    name: Rust
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/cli/hieudoanm/clap.rs
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.11.0
        with:
          components: clippy
      - name: Install zig
        run: |
          case "$RUNNER_OS" in
            Linux)
              url="https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz"
              dir="zig-linux-x86_64-0.14.0"
              ;;
            macOS)
              url="https://ziglang.org/download/0.14.0/zig-macos-aarch64-0.14.0.tar.xz"
              dir="zig-macos-aarch64-0.14.0"
              ;;
          esac
          curl -fsSL "$url" | tar xJ -C /tmp
          echo "/tmp/$dir" >> "$GITHUB_PATH"
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Build (cross-compile)
        run: make build-all
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-rust
          path: packages/cli/hieudoanm/clap.rs/bin/*

  go:
    name: Go
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/cli/hieudoanm/cobra.go
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Install Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.4'
          cache-dependency-path: packages/cli/hieudoanm/cobra.go/go.sum
      - name: Install Dependencies
        run: go mod download
      - name: Install zig
        run: |
          case "$RUNNER_OS" in
            Linux)
              url="https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz"
              dir="zig-linux-x86_64-0.14.0"
              ;;
            macOS)
              url="https://ziglang.org/download/0.14.0/zig-macos-aarch64-0.14.0.tar.xz"
              dir="zig-macos-aarch64-0.14.0"
              ;;
          esac
          curl -fsSL "$url" | tar xJ -C /tmp
          echo "/tmp/$dir" >> "$GITHUB_PATH"
      - name: Lint
        run: make lint
      - name: Test
        run: make test
      - name: Build (cross-compile)
        run: make build-all
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-go
          path: packages/cli/hieudoanm/cobra.go/bin/*

  swift:
    name: Swift
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/cli/hieudoanm/swift
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Build
        run: make build
      - name: Test
        run: swift test
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-swift
          path: packages/cli/hieudoanm/swift/.build/release/hieudoanm

  publish:
    name: Publish to GitHub Release
    needs: [rust, go, swift]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect Release Artifacts
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            artifact_name=$(basename "$dir")
            for file in "$dir"*; do
              cp "$file" "release/${artifact_name}-$(basename "$file")"
            done
          done
      - name: Publish Release
        run: |
          gh release delete cli-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create cli-latest \
            --title "CLI (latest)" \
            --notes "Auto-built CLI tools from commit ${{ github.sha }}" \
            release/*
        env:
          GH_TOKEN: ${{ github.token }}
