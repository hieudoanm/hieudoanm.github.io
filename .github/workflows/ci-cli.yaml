name: CI - CLI

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'hotfix/**'
      - 'feature/**'
      - 'renovate/**'
      - 'dependabot/**'
    paths:
      - 'packages/cli/hieudoanm/clap.rs/**'
      - 'packages/cli/hieudoanm/cobra.go/**'
      - 'packages/cli/hieudoanm/swift/**'
      - '.github/workflows/ci-cli.yaml'

permissions:
  contents: write

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli/hieudoanm/clap.rs
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1.11.0
        with:
          components: clippy
      - name: Lint
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test
      - name: Build
        run: cargo build --release
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-rust
          path: packages/cli/hieudoanm/clap.rs/target/release/hieudoanm

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli/hieudoanm/cobra.go
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Install Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.3'
          cache-dependency-path: packages/cli/hieudoanm/cobra.go/go.sum
      - name: Install Dependencies
        run: go mod download
      - name: Lint
        run: go vet ./...
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -ldflags="-s -w" -o bin/hieudoanm main.go
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-go
          path: packages/cli/hieudoanm/cobra.go/bin/hieudoanm

  swift:
    name: Swift
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/cli/hieudoanm/swift
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Build
        run: make build
      - name: Test
        run: swift test
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cli-swift
          path: packages/cli/hieudoanm/swift/.build/release/hieudoanm

  publish:
    name: Publish to GitHub Release
    needs: [rust, go, swift]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect Release Artifacts
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            artifact_name=$(basename "$dir")
            for file in "$dir"*; do
              cp "$file" "release/${artifact_name}-$(basename "$file")"
            done
          done
      - name: Publish Release
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --title "CLI Tools (latest)" \
            --notes "Auto-built CLI tools from commit ${{ github.sha }}" \
            release/*
        env:
          GH_TOKEN: ${{ github.token }}
