name: CI - CLI - Cobra

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'hotfix/**'
      - 'feature/**'
      - 'renovate/**'
      - 'dependabot/**'
    paths:
      - 'packages/cli/hieudoanm/cobra.go/**'
      - '.github/workflows/ci-cli-cobra.yaml'

permissions:
  contents: write

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli/hieudoanm/go
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.26.3'
          cache-dependency-path: packages/cli/hieudoanm/cobra.go/go.sum

      - name: Install Dependencies
        run: go mod download
      - name: Lint
        run: go vet ./...
      - name: Test
        run: go test ./...
