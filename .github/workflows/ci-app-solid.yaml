name: CI - App - SolidJS

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'hotfix/**'
      - 'feature/**'
      - 'renovate/**'
      - 'dependabot/**'
    paths:
      - 'packages/app/solidjs.com/**'
      - '.github/workflows/ci-app-solid.yaml'

permissions:
  contents: write

jobs:
  ci:
    name: Lint & Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: '11.5.2'
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '26.3.0'
          cache: 'pnpm'
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          install-chromedriver: true
      - name: Install Dependencies
        run: pnpm install
      - name: Lint
        run: pnpm run lint --filter=...[origin/master]
      - name: Build
        run: pnpm run build --filter=...[origin/master]
      - name: Test
        run: pnpm run test --filter=...[origin/master]
