name: Continuous Integration (CLI)

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'hotfix/**'
      - 'feature/**'
      - 'renovate/**'
      - 'dependabot/**'

permissions:
  contents: write

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli/hieudoanm/go
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache-dependency-path: packages/cli/hieudoanm/go/go.sum

      - name: Install Dependencies
        run: go mod download
      - name: Lint
        run: go vet ./...
      - name: Test
        run: go test ./...
