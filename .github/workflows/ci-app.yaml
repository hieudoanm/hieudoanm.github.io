name: CI - App

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'hotfix/**'
      - 'feature/**'
      - 'renovate/**'
      - 'dependabot/**'
    paths:
      - 'packages/app/expo.dev/**'
      - 'packages/app/nextjs.org/**'
      - 'packages/app/solidjs.com/**'
      - '.github/workflows/ci-app.yaml'

permissions:
  contents: write

jobs:
  expo:
    name: Expo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: '11.5.2'
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '26.3.0'
          cache: 'pnpm'
      - name: Install Dependencies
        run: pnpm install
      - name: Lint
        run: pnpm run lint --filter=...[origin/master]
      - name: Build
        run: pnpm run build --filter=...[origin/master]
      - name: Test
        run: pnpm run test --filter=...[origin/master]
      - name: Build Artifact
        working-directory: packages/app/expo.dev
        run: pnpm tauri build --ci --config '{"build":{"beforeBuildCommand":""}}'
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-tauri-expo
          path: packages/app/expo.dev/src-tauri/target/release/bundle/

  next:
    name: Next.js
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: '11.5.2'
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '26.3.0'
          cache: 'pnpm'
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          install-chromedriver: true
      - name: Install Dependencies
        run: pnpm install
      - name: Lint
        run: pnpm run lint --filter=...[origin/master]
      - name: Build
        run: pnpm run build --filter=...[origin/master]
      - name: Test
        run: pnpm run test --filter=...[origin/master]

  solid:
    name: SolidJS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: '11.5.2'
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '26.3.0'
          cache: 'pnpm'
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1.7.3
        with:
          install-chromedriver: true
      - name: Install Dependencies
        run: pnpm install
      - name: Lint
        run: pnpm run lint --filter=...[origin/master]
      - name: Build
        run: pnpm run build --filter=...[origin/master]
      - name: Test
        run: pnpm run test --filter=...[origin/master]

  publish:
    name: Publish to GitHub Release
    needs: expo
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: app-tauri-expo
          path: release
      - name: Publish Release
        run: |
          gh release delete app-tauri-expo-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create app-tauri-expo-latest \
            --title "Tauri Desktop App (latest)" \
            --notes "Auto-built Tauri app from commit ${{ github.sha }}" \
            release/*
        env:
          GH_TOKEN: ${{ github.token }}
