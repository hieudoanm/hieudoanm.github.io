name: CI - Extensions Browser

on:
  push:
    branches:
      - 'master'
      - 'develop'
      - 'hotfix/**'
      - 'feature/**'
      - 'renovate/**'
      - 'dependabot/**'
    paths:
      - 'packages/extensions/browser/**'
      - '.github/workflows/ci-extensions-browser.yaml'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: '11.9.0'
      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '26.3.1'
          cache: 'pnpm'
      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1.7.3
      - name: Install Dependencies
        run: pnpm install
      - name: Build
        run: pnpm run build --filter=@hieudoanm.github.io/extension
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hieudoanm-extension
          path: packages/extensions/browser/hieudoanm/ts/download/

  publish:
    name: Publish to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect Release Artifacts
        run: |
          mkdir -p release
          find artifacts -type f -exec cp {} release/ \;
      - name: Publish Release
        run: |
          gh release delete extensions-browser-latest --yes --cleanup-tag 2>/dev/null || true
          gh release create extensions-browser-latest \
            --title "Extensions Browser (latest)" \
            --notes "Auto-built Extensions Browser from commit ${{ github.sha }}" \
            release/*
        env:
          GH_TOKEN: ${{ github.token }}
