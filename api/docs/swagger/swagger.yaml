info:
  title: hieudoanm
  description: Hieu Doan
  version: "1.0"
  contact: {}
tags: []
servers: []
components:
  schemas:
    ChessOpeningDto:
      type: object
      properties: {}
    OpeningsResponseDto:
      type: object
      properties:
        total:
          type: number
        openings:
          type: array
          items:
            $ref: "#/components/schemas/ChessOpeningDto"
      required:
        - total
        - openings
    EcosResponseDto:
      type: object
      properties:
        total:
          type: number
        ecos:
          type: array
          items:
            type: string
      required:
        - total
        - ecos
    ChessPlayerDto:
      type: object
      properties: {}
    ChessGameDto:
      type: object
      properties: {}
    GamesResponseDto:
      type: object
      properties:
        total:
          type: number
        games:
          type: array
          items:
            $ref: "#/components/schemas/ChessGameDto"
      required:
        - total
        - games
    SyncRequestDto:
      type: object
      properties:
        month:
          type: number
        year:
          type: number
      required:
        - month
        - year
    SyncedResponseDto:
      type: object
      properties:
        total:
          type: number
        synced:
          type: number
        existed:
          type: number
      required:
        - total
        - synced
        - existed
    GamesDto:
      type: object
      properties:
        total:
          type: number
        win:
          type: number
        draw:
          type: number
        loss:
          type: number
        periods:
          type: array
          items:
            type: string
        timeOfDays:
          type: array
          items:
            type: string
        daysOfWeek:
          type: array
          items:
            type: string
      required:
        - total
        - win
        - draw
        - loss
        - periods
        - timeOfDays
        - daysOfWeek
    AccuracyByPeriodDto:
      type: object
      properties:
        average:
          type: number
        period:
          type: number
      required:
        - average
        - period
    AccuracyByTimeOfDayDto:
      type: object
      properties:
        average:
          type: number
        timeOfDay:
          type: string
      required:
        - average
        - timeOfDay
    AccuracyByDayOfWeekDto:
      type: object
      properties:
        average:
          type: number
        dayOfWeek:
          type: string
      required:
        - average
        - dayOfWeek
    AccuracyDto:
      type: object
      properties:
        average:
          type: number
        win:
          type: number
        draw:
          type: number
        loss:
          type: number
        periods:
          $ref: "#/components/schemas/AccuracyByPeriodDto"
        timeOfDays:
          $ref: "#/components/schemas/AccuracyByTimeOfDayDto"
        daysOfWeek:
          $ref: "#/components/schemas/AccuracyByDayOfWeekDto"
      required:
        - average
        - win
        - draw
        - loss
        - periods
        - timeOfDays
        - daysOfWeek
    ResultDto:
      type: object
      properties: {}
    ResultsByTimeOfDayDto:
      type: object
      properties: {}
    ResultsByDayOfWeekDto:
      type: object
      properties: {}
    ResultsDto:
      type: object
      properties:
        win:
          type: array
          items:
            $ref: "#/components/schemas/ResultDto"
        draw:
          type: array
          items:
            $ref: "#/components/schemas/ResultDto"
        loss:
          type: array
          items:
            $ref: "#/components/schemas/ResultDto"
        timeOfDays:
          type: array
          items:
            $ref: "#/components/schemas/ResultsByTimeOfDayDto"
        daysOfWeek:
          type: array
          items:
            $ref: "#/components/schemas/ResultsByDayOfWeekDto"
      required:
        - win
        - draw
        - loss
        - timeOfDays
        - daysOfWeek
    OpponentDto:
      type: object
      properties:
        opponent:
          type: string
        games:
          type: number
        win:
          type: number
        draw:
          type: number
        loss:
          type: number
      required:
        - opponent
        - games
        - win
        - draw
        - loss
    InsightsDto:
      type: object
      properties:
        username:
          type: string
        games:
          $ref: "#/components/schemas/GamesDto"
        accuracy:
          $ref: "#/components/schemas/AccuracyDto"
        results:
          $ref: "#/components/schemas/ResultsDto"
        opponents:
          type: array
          items:
            $ref: "#/components/schemas/OpponentDto"
      required:
        - username
        - games
        - accuracy
        - results
        - opponents
    CountryDto:
      type: object
      properties: {}
    StreamersResponseDto:
      type: object
      properties:
        total:
          type: number
        players:
          type: array
          items:
            $ref: "#/components/schemas/ChessPlayerDto"
        countries:
          type: array
          items:
            $ref: "#/components/schemas/CountryDto"
      required:
        - total
        - players
        - countries
    TitlesDto:
      type: object
      properties:
        total:
          type: number
        titles:
          type: array
          items:
            type: string
      required:
        - total
        - titles
    TitledStatsDto:
      type: object
      properties:
        averageRapidRating:
          type: number
        maxRapidRating:
          type: number
        averageBlitzRating:
          type: number
        maxBlitzRating:
          type: number
        averageBulletRating:
          type: number
        maxBulletRating:
          type: number
        total:
          type: number
        players:
          type: array
          items:
            $ref: "#/components/schemas/ChessPlayerDto"
      required:
        - averageRapidRating
        - maxRapidRating
        - averageBlitzRating
        - maxBlitzRating
        - averageBulletRating
        - maxBulletRating
        - total
        - players
    CountriesResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        regions:
          default: []
          type: array
          items:
            type: string
        subregions:
          default: []
          type: array
          items:
            type: string
        countries:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/CountryDto"
      required:
        - total
        - regions
        - subregions
        - countries
    CurrencyDto:
      type: object
      properties:
        code:
          type: string
          default: ""
        name:
          type: string
          default: ""
        symbol:
          type: string
          default: ""
      required:
        - code
        - name
        - symbol
    CurrenciesResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        currencies:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/CurrencyDto"
      required:
        - total
        - currencies
    LanguageDto:
      type: object
      properties:
        code:
          type: string
          default: ""
        name:
          type: string
          default: ""
      required:
        - code
        - name
    LanguagesResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        languages:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/LanguageDto"
      required:
        - total
        - languages
    OrganizationDto:
      type: object
      properties: {}
    OrganizationsResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        organizations:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/OrganizationDto"
      required:
        - total
        - organizations
    EthnicGroupDto:
      type: object
      properties: {}
    EthnicGroupsResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        ethnicGroups:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/EthnicGroupDto"
      required:
        - total
        - ethnicGroups
    LicensePlateDto:
      type: object
      properties: {}
    LicensePlatesResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        licensePlates:
          default: []
          type: array
          items:
            $ref: "#/components/schemas/LicensePlateDto"
      required:
        - total
        - licensePlates
    CoinDto:
      type: object
      properties:
        uuid:
          type: string
        symbol:
          type: string
        name:
          type: string
        color:
          type: string
        iconUrl:
          type: string
        marketCap:
          type: string
        price:
          type: string
        listedAt:
          type: number
        tier:
          type: number
        change:
          type: string
        rank:
          type: number
        sparkline:
          type: array
          items:
            type: string
        lowVolume:
          type: boolean
          default: false
        coinrankingUrl:
          type: string
        24hVolume:
          type: string
        btcPrice:
          type: number
      required:
        - uuid
        - symbol
        - name
        - color
        - iconUrl
        - marketCap
        - price
        - listedAt
        - tier
        - change
        - rank
        - sparkline
        - lowVolume
        - coinrankingUrl
        - 24hVolume
        - btcPrice
    CoinsResponseDto:
      type: object
      properties:
        total:
          type: number
          default: 0
        coins:
          default: []
