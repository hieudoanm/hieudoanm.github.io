[package]
name = "browserverless"
version = "0.0.1"
description = "Headless Browser for Serverless"
authors = ["hieudoanm <hieumdoan@gmail.com> (https://hieudoanm.github.io)"]
license = "GPL-3.0"
repository = "git+ssh://git@github.com/hieudoanm/hieudoanm.github.io.git"
edition = "2021"

[dependencies]
# HTTP client
reqwest = { version = "=0.12.28", default-features = false, features = ["rustls-tls", "cookies"] }

# Async runtime
tokio = { version = "=1.52.3", features = ["rt", "rt-multi-thread", "macros", "time"] }

# CLI
clap = { version = "=4.6.1", features = ["derive"] }

# HTML parsing & serialization
html5ever = "=0.39.0"
markup5ever_rcdom = "=0.39.0"

# JavaScript engine
boa_engine = "=0.21"

# URL handling
url = "=2.5.8"
base64 = "=0.22.1"

# Error handling
anyhow = "=1.0.102"

# Logging
log = "=0.4.32"
env_logger = "=0.11.10"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"
