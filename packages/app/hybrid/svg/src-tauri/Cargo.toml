[package]
name = "svg"
version = "0.0.1"
description = "SVG - Vector Editor"
authors = ["hieudoanm"]
edition = "2021"

[lib]
name = "svg_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
