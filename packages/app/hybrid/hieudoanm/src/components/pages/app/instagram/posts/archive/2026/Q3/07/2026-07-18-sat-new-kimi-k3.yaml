# Post 7 (Stat Row)
stat-row:
  headline: Kimi K3 Changes the Assumption
  text:
    Open-weight models were often seen as less capable than proprietary ones.
    Kimi K3 challenges that assumption by rivaling GPT-5.6 Sol and Claude Fable
    5 while remaining openly available.
  stats:
    - value: 2.8T
      label: Parameters
    - value: '57.1'
      label: Intelligence Index
    - value: $0.94
      label: Cost per Task
  citation: Moonshot AI (2026); Artificial Analysis (2026)

---
# Post 8 (Checklist)
checklist:
  headline: Key Takeaways
  text:
    Today's benchmark leader may change tomorrow, but open-weight models
    continue creating value long after the rankings shift.
  items:
    - Benchmark rankings are temporary.
    - Open weights create long-term value.
    - Developers can build and customize more freely.
    - Organizations gain greater control over deployment.
    - Researchers benefit from transparency and reproducibility.
    - Kimi K3 marks an important milestone for open AI.
  citation: Moonshot AI (2026); Open Source Initiative (2024)

