# Post 1 (Highlighted Title)
highlighted-title:
  headline: 'Why Open Weights Matter: A Case Study of Kimi K3'
  highlights:
    - Kimi
    - K3
  text:
    Kimi K3's biggest contribution isn't its benchmark ranking. It's proving
    that a frontier-scale AI model can be released with open weights.
  citation: ''

---
# Post 2 (Takeaway)
takeaway:
  headline: It's About Being Open
  text:
    Most frontier AI models, including GPT-5.6 Sol and Claude Fable 5, are only
    available through proprietary APIs. Kimi K3 is different—it combines
    frontier-level capability with open weights that anyone can build upon.
  source: Open Source AI Definition (OSI, 2024)
  citation: ''

---
# Post 3 (Breakdown Card)
breakdown-card:
  headline: What Open Weights Unlock
  summary:
    Open weights shift control from AI providers to the community, enabling
    developers, organizations, and researchers to use AI on their own terms.
  points:
    - title: Self-Host
      detail:
        Run models on your own infrastructure instead of relying on a hosted
        API.
    - title: Inspect
      detail:
        Analyze how the model behaves instead of treating it as a black box.
    - title: Fine-Tune
      detail: Adapt models for your own tasks instead of starting from scratch.
  citation: Open Source Initiative (2024)

---
