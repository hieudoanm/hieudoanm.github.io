# Slide 2 (Icon + Text)
icon-text:
  icon: '⚛️'
  headline: React Native
  text:
    Native mobile apps built with React. Large ecosystem and direct access to
    native modules.

---
# Slide 3 (Icon + Text)
icon-text:
  icon: '🚀'
  headline: Expo
  text:
    A managed layer on top of React Native. Faster setup, OTA updates, and less
    native config.

---
# Slide 4 (Icon + Text)
icon-text:
  icon: '⚡'
  headline: Ionic
  text:
    Web-based UI components wrapped as a native app. Great if your team already
    knows web dev.

---
# Slide 5 (Icon + Text)
icon-text:
  icon: '🌉'
  headline: Capacitor
  text:
    A native runtime for web apps. Bring your own framework, ship it as a real
    mobile app.

---
