---
# Slide 5 (Myth vs Fact)
myth-vs-fact:
  headline: Common Misconception
  myth:
    'Wrapping everything in memo, useMemo, and useCallback makes an app faster.'
  fact:
    'Each of these has its own overhead. Overusing them on cheap components or
    simple values can make an app slower, not faster.'

---
# Slide 6 (Comparison)
comparison:
  headline: Before vs After
  before:
    label: 'Before'
    text:
      'ExpensiveList re-renders on every keystroke because the parent re-renders
      and passes a new items reference each time.'
  after:
    label: 'After'
    text:
      'Wrapping ExpensiveList in React.memo and the items array in useMemo means
      it only re-renders when the actual data changes.'
  imageUrl: ''

---
# Slide 7 (Tip Card)
tip-card:
  number: '04'
  headline: Measure Before You Memoize
  text:
    Use the React DevTools Profiler to find components that actually re-render
    too often. Optimizing a component that already renders in under a
    millisecond adds complexity for no real gain.

---
# Slide 8 (Bullet List)
bullet-list:
  headline: Performance, Recap
  items:
    - 'React.memo skips re-renders when props are unchanged'
    - 'useMemo caches a value, useCallback caches a function'
    - "Profile first — don't memoize by default"

