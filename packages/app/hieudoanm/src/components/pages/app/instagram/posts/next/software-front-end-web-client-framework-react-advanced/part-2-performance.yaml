# Slide 2 (Minimal)
minimal:
  headline: Most components don't need to be optimized
  text:
    React re-renders fast by default. These three tools exist for the specific
    cases where a re-render is expensive or happening far more often than it
    needs to — not as a default habit.
  imageUrl: ''

---
# Slide 3 (Code)
laptop:
  headline: The Problem They Solve
  description:
    Without memoization, every keystroke in the input re-renders ExpensiveList,
    even though its data never changed.
  code:
    "function Parent() {\n  const [text, setText] = useState('');\n  const data
    = [1, 2, 3];\n\n  return (\n    <>\n      <input value={text} onChange={e =>
    setText(e.target.value)} />\n      <ExpensiveList items={data}
    />\n    </>\n  );\n}"
  language: 'TypeScript'

