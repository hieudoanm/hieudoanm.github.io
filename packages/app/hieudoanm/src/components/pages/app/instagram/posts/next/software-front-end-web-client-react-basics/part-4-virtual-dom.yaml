# Slide 2 (Minimal)
minimal:
  headline: React doesn't touch the real DOM until it has to
  text:
    Every render, React builds a lightweight tree in memory first. It compares
    that tree to the last one, then updates only the parts of the real DOM that
    actually changed.
  imageUrl: ''

