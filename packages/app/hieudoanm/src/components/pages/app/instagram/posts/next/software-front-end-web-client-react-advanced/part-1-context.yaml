# Post 4 (Architecture Diagram)
architecture-diagram:
  title: How Values Reach Deep Components
  components:
    - name: Provider
      desc: Holds the value at the top of the tree
    - name: Middle Components
      desc: Render children — never touch the value
    - name: Consumer
      desc: Calls useContext() to read the value directly
  connections:
    - from: Provider
      to: Middle Components
      label: renders
    - from: Middle Components
      to: Consumer
      label: renders
    - from: Provider
      to: Consumer
      label: value reaches directly

---
# Post 5 (Myth vs Fact)
myth-vs-fact:
  headline: Common Misconception
  myth: Context is a full replacement for state management libraries like Redux.
  fact:
    Context is for passing values down a tree, not for high-frequency updates.
    It works best for things like theme, auth, or locale — not fast-changing app
    state.

---
# Post 6 (Tip Card)
tip-card:
  number: '01'
  headline: Every Consumer Re-Renders
  text:
    When a context value changes, every component reading it re-renders — even
    if they only use part of the value. Split contexts by concern instead of
    bundling everything into one.

---
# Post 7 (Bullet List)
bullet-list:
  headline: Context API, Recap
  items:
    - Provider holds the value, Consumer reads it directly
    - Best for low-frequency values like theme or auth
    - Split contexts to avoid unnecessary re-renders

