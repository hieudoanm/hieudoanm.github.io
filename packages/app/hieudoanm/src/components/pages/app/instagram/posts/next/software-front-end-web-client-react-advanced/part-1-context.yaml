# Post 2 (Minimal)
minimal:
  headline: Context skips the middlemen entirely
  text:
    Composition solves prop drilling when you can restructure the tree. Context
    solves it when you can't — deeply nested components can read a value
    directly, with nothing in between passing it along.
  imageUrl: ''

