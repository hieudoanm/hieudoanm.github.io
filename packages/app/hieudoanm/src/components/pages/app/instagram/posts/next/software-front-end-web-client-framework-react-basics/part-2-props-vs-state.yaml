# Slide 2 (Minimal)
minimal:
  headline: One flows in. The other lives inside.
  text:
    Props are handed to a component by its parent and can't be changed by the
    component itself. State belongs to the component and can change over time,
    in response to user actions.
  imageUrl: ''

