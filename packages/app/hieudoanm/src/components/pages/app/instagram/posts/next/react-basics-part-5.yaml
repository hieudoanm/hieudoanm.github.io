# Slide 3 (Versus)
versus:
  headline: Server vs Client Components
  optionA:
    label: 'Server Components'
    desc: 'Default in the App Router'
  optionB:
    label: 'Client Components'
    desc: 'Opt in with "use client"'
  features:
    - a: 'Ships zero JS to the browser'
      b: 'Ships JS, needs hydration'
    - a: 'Can access databases and secrets directly'
      b: 'Runs entirely in the browser'
    - a: 'No useState, no event handlers'
      b: 'Full access to hooks and interactivity'

---
# Slide 4 (Code)
laptop:
  headline: Opting Into the Client
  description:
    The directive at the top of the file marks everything below as a Client
    Component — this is what unlocks useState and onClick.
  code:
    "'use client';\n\nimport { useState } from 'react';\n\nfunction Counter()
    {\n  const [count, setCount] = useState(0);\n  return <button onClick={() =>
    setCount(count + 1)}>{count}</button>;\n}"
  language: 'TypeScript'

---
# Slide 5 (Myth vs Fact)
myth-vs-fact:
  headline: Common Misconception
  myth: '"use client" means the component only runs in the browser.'
  fact:
    'Client Components still render once on the server for the initial HTML,
    then hydrate in the browser to become interactive.'

---
# Slide 6 (Bullet List)
bullet-list:
  headline: Before You Move to Part 6
  items:
    - 'Default to Server Components, opt into Client only when needed'
    - '"use client" marks the interactivity boundary, not "browser-only"'
    - 'Server Components can read data directly, no API layer required'

