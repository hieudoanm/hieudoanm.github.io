# Slide 2 (Minimal)
minimal:
  headline: Not every component needs to run in the browser
  text:
    Server Components render on the server and ship zero JavaScript to the
    client. Client Components hydrate in the browser and can hold state,
    effects, and event handlers.
  imageUrl: ''

