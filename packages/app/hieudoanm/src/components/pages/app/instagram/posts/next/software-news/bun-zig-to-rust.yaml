# Post 8 (Bullet List)
bullet-list:
  headline: Bun in Rust, Recap
  items:
    - 'Zig → Rust: 535K → 1M+ lines'
    - 64 Claudes, 11 days, ~$165K
    - Drop replaces manual defer cleanup
    - 'Memory: 6.7GB → 609MB, binary -20%'
    - Ships in Bun v1.4.0 canary

