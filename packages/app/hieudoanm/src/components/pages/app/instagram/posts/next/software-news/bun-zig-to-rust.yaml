# Post 1 (Highlighted Title)
highlighted-title:
  headline: "Bun's Zig \u2192 Rust Rewrite"
  highlights:
    - Rust
  text: 1M+ lines of code, rewritten by AI, in 11 days

---
# Post 2 (Minimal)
minimal:
  headline: Zig Wasn't the Problem. Memory Was.
  text:
    Bun mixed a garbage-collected JS engine with Zig's manual memory management.
    One of the resulting bugs was even implicated in the recent Claude Code
    source leak. This wasn't cosmetic. It was a liability.
  imageUrl: ''

---
# Post 3 (Minimal)
minimal:
  headline: So They Let Claude Rewrite It
  text:
    Bun ships 22M downloads a month. A hand rewrite would take a team a year,
    frozen on bugfixes the whole time. Bun, now owned by Anthropic, had a
    pre-release Claude Fable 5 mechanically port all 535K lines to Rust instead.
  imageUrl: ''

---
# Post 4 (Comparison)
comparison:
  headline: Manual Cleanup vs Automatic
  before:
    label: Zig
    text:
      defer must be added at every call site — easy to forget, easy to
      double-free.
  after:
    label: Rust
    text:
      Drop runs automatically when a value goes out of scope —
      compiler-enforced.
  imageUrl: ''

---
# Post 5 (Timeline)
timeline:
  title: 11 Days, Start to Merge
  entries:
    - date: Before Day 1
      event:
        Codebase already had Rust-shaped internals — smart pointers, a
        bun_collections crate
    - date: Day 1
      event: Porting guide + lifetime map for 1,448 files
    - date: Days 1-3
      event: Trial run on 3 files, then the full port begins
    - date: Days 3-9
      event: 64 Claudes fix ~16,000 compiler errors, crate by crate
    - date: Days 9-11
      event: Full test suite goes green on all 6 platforms
  imageUrl: ''

---
# Post 6 (Code)
code:
  headline: Catching the Bugs Claude Missed
  description:
    A second Claude, in its own context, was told to assume the code was wrong.
  code:
    "pipe.close(Subprocess::on_pipe_close);\n// Box `pipe` drops at scope end
    —\n// libuv still holds the freed pointer.\n// Fix:
    Box::leak(pipe).close(...)"
  language: Rust

