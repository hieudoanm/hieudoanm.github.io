[package]
name = "lodashx_rs"
version = "0.1.0"
edition = "2024"
description = "lodashx.rs"
repository = "https://github.com/hieudoanm/hieudoanm.github.io"
license = "GPL-3.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
js-sys = "0.3"
chrono = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
getrandom = { version = "0.2", features = ["js"] }
rand = "0.8"
serde-wasm-bindgen = "0.6"

