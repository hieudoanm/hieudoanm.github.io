[package]
name = "lodashx_rs"
version = "0.1.0"
edition = "2024"
description = "lodashx.rs"
repository = "https://github.com/hieudoanm/hieudoanm.github.io"
license = "GPL-3.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "=0.2.122"
js-sys = "=0.3.99"
chrono = "=0.4.45"
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
getrandom = { version = "=0.2.17", features = ["js"] }
rand = "=0.8.6"
serde-wasm-bindgen = "=0.6.5"

