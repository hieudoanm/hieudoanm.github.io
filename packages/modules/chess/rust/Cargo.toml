[package]
name = "chess_rs"
version = "0.0.1"
edition = "2024"
description = "Chess library ported to Rust"
repository = "https://github.com/hieudoanm/hieudoanm.github.io"
license = "GPL-3.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
wasm-bindgen = "=0.2.122"
