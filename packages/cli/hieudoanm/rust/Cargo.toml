[package]
name = "hieudoanm"
version = "0.1.0"
edition = "2021"
description = "A personal CLI toolbox"
authors = ["Hieu Doan"]

[[bin]]
name = "hieudoanm"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["json", "blocking"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
anyhow = "1"
thiserror = "2"
colored = "2"
chrono = { version = "0.4", features = ["serde"] }
regex = "1"
rand = "0.8"
uuid = { version = "1", features = ["v1", "v4", "v7"] }
qrcode = "0.14"
rusqlite = { version = "0.32", features = ["bundled"] }
base64 = "0.22"
url = "2"
log = "0.4"
env_logger = "0.11"
dirs = "5"
deunicode = "1"
html-escape = "0.2"
quick-xml = { version = "0.37", features = ["serialize"] }
lazy_static = "1"
once_cell = "1"
walkdir = "2"
sysinfo = "=0.39.2"
