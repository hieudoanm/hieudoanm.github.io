[package]
name = "hieudoanm"
version = "0.1.0"
edition = "2021"
description = "A personal CLI toolbox"
authors = ["Hieu Doan"]

[[bin]]
name = "hieudoanm"
path = "src/main.rs"

[dependencies]
clap = { version = "=4.6.1", features = ["derive"] }
tokio = { version = "=1.52.3", features = ["full"] }
reqwest = { version = "=0.12.28", features = ["json", "blocking"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
anyhow = "=1.0.102"
thiserror = "=2.0.18"
colored = "=2.2.0"
chrono = { version = "=0.4.44", features = ["serde"] }
regex = "=1.12.3"
rand = "=0.8.6"
uuid = { version = "=1.23.1", features = ["v1", "v4", "v7"] }
qrcode = "=0.14.1"
rusqlite = { version = "=0.32.1", features = ["bundled"] }
base64 = "=0.22.1"
url = "=2.5.8"
log = "=0.4.30"
env_logger = "=0.11.10"
dirs = "=5.0.1"
deunicode = "=1.6.2"
html-escape = "=0.2.13"
quick-xml = { version = "=0.37.5", features = ["serialize"] }
lazy_static = "=1.5.0"
once_cell = "=1.21.4"
walkdir = "=2.5.0"
sysinfo = "=0.39.2"
