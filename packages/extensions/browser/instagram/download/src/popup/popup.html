<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram Downloader</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 280px;
        background: #0a0a0a;
        color: #f5f5f5;
        font-family: 'Georgia', serif;
        padding: 24px 20px 20px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
      }

      .logo-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(
          135deg,
          #f09433,
          #e6683c,
          #dc2743,
          #cc2366,
          #bc1888
        );
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
      }

      .logo-text {
        font-size: 15px;
        font-weight: bold;
        color: #fff;
        letter-spacing: 0.02em;
        line-height: 1.2;
      }

      .logo-sub {
        font-size: 11px;
        color: #888;
        font-family: monospace;
        font-style: normal;
        letter-spacing: 0.05em;
      }

      .divider {
        height: 1px;
        background: linear-gradient(to right, transparent, #333, transparent);
        margin: 14px 0;
      }

      .step {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        margin-bottom: 10px;
        font-size: 12px;
        color: #aaa;
        font-family: system-ui, sans-serif;
        line-height: 1.7;
      }

      .step-num {
        background: #222;
        border: 1px solid #333;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        font-size: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: #ccc;
        font-family: monospace;
        margin-top: 1px;
      }

      .step strong {
        color: #e5e5e5;
        font-weight: 600;
      }

      .tip {
        margin-top: 16px;
        padding: 10px 12px;
        background: #141414;
        border: 1px solid #222;
        border-left: 3px solid #dc2743;
        border-radius: 4px;
        font-size: 11px;
        color: #888;
        font-family: system-ui, sans-serif;
        line-height: 1.6;
      }

      .tip em {
        color: #bbb;
        font-style: normal;
      }

      .footer {
        margin-top: 18px;
        text-align: center;
        font-size: 10px;
        color: #444;
        font-family: monospace;
        letter-spacing: 0.08em;
      }
    </style>
  </head>
  <body>
    <div class="logo">
      <div class="logo-icon">📷</div>
      <div>
        <div class="logo-text">Instagram DL</div>
        <div class="logo-sub">image downloader</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="step">
      <div class="step-num">1</div>
      <div>Navigate to <strong>instagram.com</strong> in any tab.</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div>
        Hover over any post image — a <strong>download button</strong> appears
        in the corner.
      </div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div>
        Click it. The image saves to your
        <strong>Downloads/instagram/</strong> folder.
      </div>
    </div>

    <div class="tip">
      <em>Tip:</em> Open a post first for the full-size image.
    </div>

    <div class="footer">files saved to Downloads/instagram/</div>
  </body>
</html>
