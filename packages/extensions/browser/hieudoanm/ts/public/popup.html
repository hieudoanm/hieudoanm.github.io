<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapShot</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0b;
      --surface: #111114;
      --border: #222228;
      --accent: #e8ff47;
      --accent2: #47ffe8;
      --text: #e8e8ec;
      --muted: #5a5a68;
      --danger: #ff4757;
      --radius: 8px;
    }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      padding: 0;
      overflow: hidden;
    }

    .header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -30px; right: -30px;
      width: 100px; height: 100px;
      background: radial-gradient(circle, rgba(232,255,71,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.1em;
      color: var(--accent);
      line-height: 1;
    }
    .brand-tag {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .tab-info {
      margin-top: 10px;
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tab-info span {
      color: var(--accent2);
    }

    .body {
      padding: 16px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Options */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .option-label {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .option-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-label {
      font-size: 11px;
      color: var(--text);
    }
    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle input:checked + .toggle-track { background: var(--accent); }
    .toggle-thumb {
      position: absolute;
      top: 3px; left: 3px;
      width: 12px; height: 12px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
      pointer-events: none;
    }
    .toggle input:checked ~ .toggle-thumb { transform: translateX(14px); }

    .select-wrap {
      position: relative;
    }
    .select-wrap select {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      appearance: none;
      padding-right: 14px;
      outline: none;
    }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 0; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 10px;
      pointer-events: none;
    }
    .select-wrap select option { background: #1a1a20; }

    /* Capture button */
    .btn-capture {
      position: relative;
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #0a0a0b;
      border: none;
      border-radius: var(--radius);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.12em;
      cursor: pointer;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-capture:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(232,255,71,0.25);
    }
    .btn-capture:active { transform: translateY(0); }
    .btn-capture.loading { pointer-events: none; }
    .btn-capture .btn-text { transition: opacity 0.2s; }
    .btn-capture.loading .btn-text { opacity: 0; }
    .btn-capture .spinner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .btn-capture.loading .spinner { opacity: 1; }
    .spinner-ring {
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0a0a0b;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Preview */
    .preview-wrap {
      display: none;
      flex-direction: column;
      gap: 8px;
    }
    .preview-wrap.visible { display: flex; }
    .preview-label {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .preview-img-box {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      position: relative;
    }
    .preview-img-box img {
      width: 100%;
      display: block;
      max-height: 140px;
      object-fit: cover;
    }
    .preview-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(10,10,11,0.6) 0%, transparent 50%);
      display: flex;
      align-items: flex-end;
      padding: 8px 10px;
    }
    .preview-size {
      font-size: 9px;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .btn-row { display: flex; gap: 8px; }
    .btn-secondary {
      flex: 1;
      padding: 9px 12px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      letter-spacing: 0.05em;
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* Status */
    .status {
      font-size: 10px;
      text-align: center;
      color: var(--muted);
      min-height: 14px;
      letter-spacing: 0.05em;
      transition: color 0.3s;
    }
    .status.ok { color: var(--accent); }
    .status.err { color: var(--danger); }

    .divider {
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

<div class="header">
  <div class="brand">
    <span class="brand-name">SnapShot</span>
    <span class="brand-tag">Tab Capture</span>
  </div>
  <div class="tab-info" id="tabUrl">
    <span>loading...</span>
  </div>
</div>

<div class="body">

  <div class="options-grid">
    <div class="option-box">
      <div class="option-label">Auto-save</div>
      <div class="toggle-row">
        <span class="toggle-label">Download</span>
        <label class="toggle">
          <input type="checkbox" id="autoDownload" checked />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>
    <div class="option-box">
      <div class="option-label">Format</div>
      <div class="select-wrap">
        <select id="formatSelect">
          <option value="png">PNG</option>
          <option value="jpeg">JPEG</option>
          <option value="webp">WebP</option>
        </select>
      </div>
    </div>
  </div>

  <button class="btn-capture" id="captureBtn">
    <span class="btn-text">Capture Tab</span>
    <div class="spinner"><div class="spinner-ring"></div></div>
  </button>

  <div class="preview-wrap" id="previewWrap">
    <div class="divider"></div>
    <div class="preview-label">Preview</div>
    <div class="preview-img-box">
      <img id="previewImg" src="" alt="Screenshot preview" />
      <div class="preview-overlay">
        <span class="preview-size" id="previewSize"></span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-secondary" id="downloadBtn">⬇ Download</button>
      <button class="btn-secondary" id="copyBtn">⧉ Copy</button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <div class="divider"></div>
  <div style="padding: 8px 20px 12px; display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted);">
    <span>Shopify:</span>
    <span id="shopifyStatus" style="color:var(--muted);">checking…</span>
  </div>

  <div class="divider"></div>
  <div style="padding: 12px 20px;">
    <div style="display:flex; align-items:center; gap:8px; margin-bottom:10px;">
      <span style="font-size:9px; color:var(--muted); letter-spacing:0.15em; text-transform:uppercase;">YouTube Transcript</span>
    </div>
    <button id="getTranscript" class="btn-secondary" style="width:100%; margin-bottom:8px;">Get Transcript</button>
    <pre id="transcript" style="font-size:10px; color:var(--muted); white-space:pre-wrap; word-wrap:break-word; max-height:120px; overflow-y:auto; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:8px; display:none;"></pre>
  </div>

  <div class="divider"></div>
  <div style="padding:8px 20px 12px; display:flex; align-items:center; gap:8px; font-size:11px; color:var(--muted);">
    <span>📷 Instagram:</span>
    <span style="color:var(--muted);">Hover images to download</span>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
