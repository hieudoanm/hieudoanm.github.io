[package]
name = "browserverless"
version = "0.0.1"
description = "Headless Browser for Serverless"
authors = ["hieudoanm <hieumdoan@gmail.com> (https://hieudoanm.github.io)"]
license = "GPL-3.0"
repository = "git+ssh://git@github.com/hieudoanm/hieudoanm.github.io.git"
edition = "2021"

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls"] }
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros", "time"] }
clap = { version = "4", features = ["derive"] }
html5ever = "0.39"
markup5ever_rcdom = "0.39"
rquickjs = { version = "0.6", features = ["macro", "full-async"] }
anyhow = "1.0"
log = "0.4"
env_logger = "0.11"
url = "2"

[profile.release]
opt-level = "z"
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"
