[package]
name = "backbone"
version = "0.0.1"
description = "Backbone - Back-end as a Service"
authors = ["hieudoanm <hieumdoan@gmail.com> (https://hieudoanm.github.io)"]
license = "GPL-3.0"
repository = "git+ssh://git@github.com/hieudoanm/hieudoanm.github.io.git"
edition = "2024"
rust-version = "1.85.0"

[dependencies]
axum = { version = "=0.8.9", features = ["ws", "macros"] }
tokio = { version = "=1.52.3", features = ["full"] }
rusqlite = { version = "=0.38.0", features = ["bundled"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
jsonwebtoken = { version = "=10.4.0", features = ["rust_crypto"] }
bcrypt = "=0.17.1"
uuid = { version = "=1.23.2", features = ["v4"] }
chrono = { version = "=0.4.44", features = ["serde"] }
tower-http = { version = "=0.6.11", features = ["cors", "fs", "limit"] }
tower = "=0.5.3"
multer = "=3.1.0"
http-body-util = "=0.1.3"
infer = "=0.19.0"
reqwest = { version = "=0.12.28", features = ["json", "multipart"] }
hmac = "=0.12.1"
sha2 = "=0.10.9"
hex = "=0.4.3"
aes-gcm = "=0.10.3"
rand = "=0.8.6"
tokio-stream = "=0.1.18"
cron = "=0.13.0"
rust-embed = "=8.11.0"
mime_guess = "=2.0.5"
deadpool = { version = "=0.12.3", features = ["rt_tokio_1"] }
image = "=0.25.10"
futures = "=0.3.32"
