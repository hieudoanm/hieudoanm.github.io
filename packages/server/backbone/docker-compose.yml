# Backbone Server - Docker Compose
# Start both Go and Rust servers:
#   docker compose up -d
#
# Go server:  http://localhost:8080
# Rust server: http://localhost:8081

services:
  backbone-go:
    build:
      context: ./go
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    volumes:
      - go_data:/data
    networks:
      - backbone-net
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:8080/api/health || exit 1',
        ]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  backbone-rust:
    build:
      context: ./rust
      dockerfile: Dockerfile
    ports:
      - '8081:8080'
    volumes:
      - rust_data:/data
    networks:
      - backbone-net
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget --no-verbose --tries=1 --spider http://localhost:8080/api/health || exit 1',
        ]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

volumes:
  go_data:
  rust_data:

networks:
  backbone-net:
