# Simple Server - Docker Compose
# Start both Go and Rust servers:
#   docker compose up -d
#
# Go server:  http://localhost:8080
# Rust server: http://localhost:8081

services:
  simple-go:
    build:
      context: ./go
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - go_data:/data
    networks:
      - simple-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  simple-rust:
    build:
      context: ./rust
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    volumes:
      - rust_data:/data
    networks:
      - simple-net
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

volumes:
  go_data:
  rust_data:

networks:
  simple-net:
