services:
  opensearch:
    image: opensearchproject/opensearch:2.19.5
    container_name: opensearch
    restart: always
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
      - '9600:9600'
    volumes:
      - opensearch_data:/usr/share/opensearch/data

volumes:
  opensearch_data:
