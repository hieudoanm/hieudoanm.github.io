# SQLite is serverless, so this compose file provides a web-based UI (sqlite-web)
# to interact with a local SQLite database file.

services:
  sqlite-web:
    image: coleifer/sqlite-web
    container_name: sqlite-web
    restart: always
    ports:
      - '8080:8080'
    volumes:
      - ./data:/data
    environment:
      SQLITE_DATABASE: mydatabase.db
    command: /data/mydatabase.db
