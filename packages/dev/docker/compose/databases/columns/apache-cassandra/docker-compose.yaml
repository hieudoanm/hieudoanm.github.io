services:
  cassandra:
    image: cassandra:5.0
    container_name: cassandra
    restart: always
    environment:
      - CASSANDRA_CLUSTER_NAME=dev
      - CASSANDRA_ENDPOINT_SNITCH=SimpleSnitch
    ports:
      - "9042:9042"
      - "7000:7000"
      - "7001:7001"
      - "7199:7199"
    volumes:
      - cassandra_data:/var/lib/cassandra

volumes:
  cassandra_data:
